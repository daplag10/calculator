<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Calculator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="calculator">
  <div class="display">
    <div class="history" id="history">&nbsp;</div>
    <div class="current" id="current">0</div>
  </div>

  <div class="keys">
    <button class="function" onclick="clearAll()">AC</button>
    <button class="function" onclick="toggleSign()">±</button>
    <button class="function" onclick="percent()">%</button>
    <button class="operator" onclick="chooseOperator('÷')">÷</button>

    <button onclick="inputDigit('7')">7</button>
    <button onclick="inputDigit('8')">8</button>
    <button onclick="inputDigit('9')">9</button>
    <button class="operator" onclick="chooseOperator('×')">×</button>

    <button onclick="inputDigit('4')">4</button>
    <button onclick="inputDigit('5')">5</button>
    <button onclick="inputDigit('6')">6</button>
    <button class="operator" onclick="chooseOperator('−')">−</button>

    <button onclick="inputDigit('1')">1</button>
    <button onclick="inputDigit('2')">2</button>
    <button onclick="inputDigit('3')">3</button>
    <button class="operator" onclick="chooseOperator('+')">+</button>

    <button class="zero" onclick="inputDigit('0')">0</button>
    <button onclick="inputDecimal()">.</button>
    <button class="operator equals" onclick="calculate()">=</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
